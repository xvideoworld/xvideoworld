<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্লে হচ্ছে...</title>
    <style>
        body { background-color: #000; color: white; margin: 0; font-family: Arial, sans-serif; }
        .player-container { width: 100%; position: relative; padding-top: 56.25%; background: #000; }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .video-title { padding: 15px; font-size: 18px; border-bottom: 1px solid #333; }
        .back-btn { display: inline-block; padding: 10px 15px; color: #ff0000; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">← ফিরে যান</a>

<div class="player-container" id="player">
    </div>

<div class="video-title" id="vTitle">ভিডিওর নাম</div>

<script>
    // ইউআরএল থেকে ভিডিওর ডাটা বের করা
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('vid');
    const videoTitle = urlParams.get('title');

    if(videoUrl) {
        document.getElementById('player').innerHTML = `<iframe src="${videoUrl}" allowfullscreen></iframe>`;
        document.getElementById('vTitle').innerText = videoTitle;
        document.title = videoTitle;
    }
</script>
</body>
</html>
