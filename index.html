<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Nyxora v2.0 - Auto Engine</title>
    <style>
        :root { --accent: #38bdf8; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--accent); }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 10px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #000; }
        .card-title { padding: 8px; text-align: center; font-size: 12px; font-weight: bold; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; flex-direction: column; }
        .nav { padding: 10px; background: #111; display: flex; align-items: center; border-bottom: 1px solid var(--accent); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">NYXORA ENGINE</h2>
    <small>Auto Content Loader</small>
</div>

<div class="container" id="video-grid"></div>

<div id="overlay">
    <div class="nav"><button onclick="closePlayer()" style="background:var(--accent); border:none; padding:5px 15px; border-radius:5px;">বন্ধ করুন</button></div>
    <iframe id="player" src="" allowfullscreen></iframe>
</div>

<script>
    // আপনাকে শুধু এখানে ভিডিওর টাইটেল আর আইডি দিতে হবে
    const myVideos = [
        { title: "3D Animation", id: "56234551" },
        { title: "Asian Clip", id: "12345678" },
        { title: "Indian Special", id: "67891234" }
    ];

    const grid = document.getElementById('video-grid');

    myVideos.forEach(v => {
        // ওদের পদ্ধতি: আইডি থেকে সরাসরি থাম্বনেইল জেনারেট করা
        const firstThree = v.id.substring(0, 3);
        const thumbUrl = `https://img-egc.xvideos-cdn.com/videos/thumbs169ll/${firstThree}/${v.id}/thumb.jpg`;
        const proxyThumb = "https://images.weserv.nl/?url=" + encodeURIComponent(thumbUrl);

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${proxyThumb}" onerror="this.src='https://via.placeholder.com/150x200?text=No+Thumb'"><div class="card-title">${v.title}</div>`;
        card.onclick = () => {
            document.getElementById('player').src = `https://www.xvideos.com/embedframe/${v.id}`;
            document.getElementById('overlay').style.display = 'flex';
        };
        grid.appendChild(card);
    });

    function closePlayer() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('player').src = '';
    }
</script>
</body>
</html>
