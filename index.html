<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #141417;
            --bg-card: #1f1f23;
            --accent-color: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-bottom: 70px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        .search-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
        }

        .app-view {
            display: none;
            padding: 16px;
        }

        .app-view.active {
            display: block;
        }

        .hero-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(9,9,11,1) 100%), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=800&auto=format&fit=crop&q=60') center/cover;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .horizontal-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .horizontal-scroll::-webkit-scrollbar {
            display: none;
        }

        .app-box-sm {
            min-width: 80px;
            max-width: 80px;
            height: 80px;
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: var(--accent-color);
        }

        .grid-2col {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .movie-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background-color: #111;
            background-size: cover;
            background-position: center;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-name {
            font-size: 14px;
            font-weight: 500;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .grid-1col {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .app-item-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-card);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
        }

        .app-details {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-icon-main {
            width: 54px;
            height: 54px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: #10b981;
        }

        .app-meta-text {
            display: flex;
            flex-direction: column;
        }

        .app-name {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 4px 0;
        }

        .app-ver {
            font-size: 12px;
            color: var(--text-muted);
            margin: 0;
        }

        .download-btn {
            background-color: var(--accent-color);
            color: var(--text-main);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color 0.2s ease;
        }

        .nav-item.active {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">NEXUS</div>
        <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
    </header>

    <main>
        <div id="home-view" class="app-view active">
            <div class="hero-banner"></div>
            <h2 class="section-title">Featured Applications</h2>
            <div class="horizontal-scroll">
                <div class="app-box-sm"><i class="fa-brands fa-android"></i></div>
                <div class="app-box-sm"><i class="fa-solid fa-gamepad"></i></div>
                <div class="app-box-sm"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="app-box-sm"><i class="fa-solid fa-shield-halved"></i></div>
                <div class="app-box-sm"><i class="fa-solid fa-screwdriver-wrench"></i></div>
            </div>
        </div>

        <div id="movie-view" class="app-view">
            <div class="hero-banner" style="background-image: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(9,9,11,1) 100%), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=800&auto=format&fit=crop&q=60');"></div>
            <h2 class="section-title">Latest Releases</h2>
            <div class="grid-2col">
                <div class="movie-card">
                    <div class="movie-poster" style="background-image: url('https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=500&auto=format&fit=crop&q=60');"></div>
                    <div class="movie-info">
                        <p class="movie-name">Cinematic Stream 1</p>
                    </div>
                </div>
                <div class="movie-card">
                    <div class="movie-poster" style="background-image: url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=500&auto=format&fit=crop&q=60');"></div>
                    <div class="movie-info">
                        <p class="movie-name">Cinematic Stream 2</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="apps-view" class="app-view">
            <h2 class="section-title">Premium Mod Applications</h2>
            <div class="grid-1col">
                <div class="app-item-card">
                    <div class="app-details">
                        <div class="app-icon-main"><i class="fa-solid fa-video"></i></div>
                        <div class="app-meta-text">
                            <h3 class="app-name">Premium Video Editor</h3>
                            <p class="app-ver">v3.5.2 (Mod Pro)</p>
                        </div>
                    </div>
                    <button class="download-btn"><i class="fa-solid fa-download"></i></button>
                </div>
                <div class="app-item-card">
                    <div class="app-details">
                        <div class="app-icon-main"><i class="fa-solid fa-music"></i></div>
                        <div class="app-meta-text">
                            <h3 class="app-name">Music Player Premium</h3>
                            <p class="app-ver">v8.1.0 (Unlocked)</p>
                        </div>
                    </div>
                    <button class="download-btn"><i class="fa-solid fa-download"></i></button>
                </div>
            </div>
        </div>

        <div id="profile-view" class="app-view">
            <h2 class="section-title">User Account</h2>
            <div style="background-color: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center;">
                <i class="fa-solid fa-circle-user" style="font-size: 64px; color: var(--text-muted); margin-bottom: 12px;"></i>
                <h3 style="margin: 0 0 4px 0;">Guest User</h3>
                <p style="margin: 0; color: var(--text-muted); font-size: 14px;">Access Configuration Options</p>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home-view', this)"><i class="fa-solid fa-house"></i></button>
        <button class="nav-item" onclick="switchTab('movie-view', this)"><i class="fa-solid fa-clapperboard"></i></button>
        <button class="nav-item" onclick="switchTab('apps-view', this)"><i class="fa-solid fa-cubes"></i></button>
        <button class="nav-item" onclick="switchTab('profile-view', this)"><i class="fa-solid fa-user-gear"></i></button>
    </nav>

    <script>
        function switchTab(viewId, button) {
            document.querySelectorAll('.app-view').forEach(view => {
                view.classList.remove('active');
            });
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(viewId).classList.add('active');
            button.classList.add('active');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
