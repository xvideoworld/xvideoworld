<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিজস্ব প্লেয়ার - জাইয়ান</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .player-container { width: 100%; max-width: 800px; padding: 10px; }
        :root { --plyr-color-main: #ff0000; } /* প্লেয়ারের কালার লাল */
    </style>
</head>
<body>

<div class="player-container">
    <video id="player" playsinline controls>
        <source id="video-source" src="" type="video/mp4" />
    </video>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    const player = new Plyr('#player');

    // ভিডিওর আসল লিংক বের করার জন্য ফাংশন
    // নোট: অনেক সাইট সরাসরি জাভাস্ক্রিপ্ট দিয়ে লিংক নিতে দেয় না (CORS Policy)
    // সেক্ষেত্রে আপনাকে ম্যানুয়ালি একবার লিংক বের করে এখানে বসাতে হবে।
    
    const videoURL = "আপনার_বের_করা_সরাসরি_লিংক.mp4"; // এখানে ডিরেক্ট লিংকটি দিন
    document.getElementById('video-source').src = videoURL;
    player.source = {
        type: 'video',
        sources: [{ src: videoURL, type: 'video/mp4' }]
    };
</script>

</body>
</html>
