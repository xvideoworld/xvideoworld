<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nyxora — Reels & Trailers</title>
  <style>
    /* ── Reset & Base ───────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    .nyxora-header {
      text-align: center;
      padding: 40px 20px 20px;
      background: linear-gradient(180deg, #14142a 0%, #0d0d1a 100%);
      border-bottom: 1px solid #2a2a4a;
    }

    .nyxora-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nyxora-header p {
      color: #888;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    /* ── Section Layout ─────────────────────────────── */
    .nyxora-section {
      max-width: 1280px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .nyxora-section h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 18px;
      padding-left: 4px;
      border-left: 4px solid #6366f1;
      padding-left: 14px;
      color: #c8c8e8;
    }

    /* ── Card Grid ──────────────────────────────────── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* ── Individual Card ────────────────────────────── */
    .video-card {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .video-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.15);
      border-color: #6366f1;
    }

    .video-card-thumbnail {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #0d0d1a;
    }

    .video-card-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .video-card:hover .video-card-thumbnail img {
      transform: scale(1.05);
    }

    .video-card-info {
      padding: 14px;
    }

    .video-card-title {
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      color: #e0e0e0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-card-author {
      margin: 0 0 4px;
      font-size: 12px;
      color: #888;
    }

    .video-card-views {
      font-size: 11px;
      color: #666;
    }

    /* ── Empty / Error States ───────────────────────── */
    .nyxora-empty,
    .nyxora-error {
      grid-column: 1 / -1;
      text-align: center;
      color: #888;
      padding: 60px 20px;
      font-size: 1rem;
    }

    .nyxora-error {
      color: #f87171;
    }

    .nyxora-loading {
      grid-column: 1 / -1;
      text-align: center;
      color: #666;
      padding: 60px 20px;
      font-size: 0.95rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── Footer ─────────────────────────────────────── */
    .nyxora-footer {
      text-align: center;
      padding: 30px 20px;
      color: #555;
      font-size: 0.8rem;
      border-top: 1px solid #1a1a30;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- ════════════════ HEADER ════════════════ -->
  <header class="nyxora-header">
    <h1>✦ Nyxora</h1>
    <p>Trending Shorts &amp; Movie Trailers — Curated from Invidious</p>
  </header>

  <!-- ════════════════ REELS SECTION ════════════════ -->
  <section class="nyxora-section">
    <h2>🔥 Trending Reels</h2>
    <div id="reel-view" class="video-grid">
      <div class="nyxora-loading">Loading reels…</div>
    </div>
  </section>

  <!-- ════════════════ MOVIES SECTION ════════════════ -->
  <section class="nyxora-section">
    <h2>🎬 Movie Trailers 2026</h2>
    <div id="movie-view" class="video-grid">
      <div class="nyxora-loading">Loading trailers…</div>
    </div>
  </section>

  <!-- ════════════════ FOOTER ════════════════ -->
  <footer class="nyxora-footer">
    Nyxora &middot; Powered by Invidious API &middot; No tracking &middot; No ads
  </footer>

  <!-- ════════════════ SYNC ENGINE ════════════════ -->
  <script>
    /**
     * sync-engine.js — Nyxora Content Sync Engine
     * Fetches reels (shorts) and movie trailers from Invidious API
     * and dynamically renders them into #reel-view and #movie-view.
     */
    (function () {
      'use strict';

      // ── Configuration ────────────────────────────────────────────
      const CONFIG = {
        // Instances in fallback order
        instances: [
          'https://vid.puffyan.us',
          'https://inv.thepixora.com',
          'https://invidious.snopyta.org',
        ],
        endpoints: {
          reels: '/api/v1/trending?type=shorts',
          movies: '/api/v1/search?q=movie+trailers+2026&type=video',
        },
        embedBase: 'https://vid.puffyan.us/embed/',
      };

      // ── Quality ranking for thumbnails (highest → lowest) ───────
      const THUMB_RANK = [
        'maxres',
        'maxresdefault',
        'sddefault',
        'high',
        'medium',
        'default',
        'start',
        'middle',
        'end',
      ];

      // ── Pick the best quality thumbnail ──────────────────────────
      function getBestThumbnail(thumbnails) {
        if (!thumbnails || thumbnails.length === 0) return '';
        for (const q of THUMB_RANK) {
          const found = thumbnails.find((t) => t.quality === q);
          if (found) return found.url;
        }
        return thumbnails[thumbnails.length - 1].url;
      }

      // ── Format view count ────────────────────────────────────────
      function formatViews(viewCount) {
        if (viewCount == null) return '';
        const n = Number(viewCount);
        if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(1) + 'B views';
        if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M views';
        if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K views';
        return n + ' views';
      }

      // ── Fetch from Invidious with instance fallback ──────────────
      async function fetchFromInvidious(endpoint) {
        let lastError = null;

        for (const base of CONFIG.instances) {
          try {
            const url = `${base}${endpoint}`;
            const resp = await fetch(url, {
              headers: { Accept: 'application/json' },
            });

            if (!resp.ok) {
              lastError = new Error(`HTTP ${resp.status} from ${base}`);
              continue;
            }

            const data = await resp.json();

            if (!Array.isArray(data)) {
              lastError = new Error(`Unexpected response from ${base}`);
              continue;
            }

            return data;
          } catch (err) {
            lastError = err;
            console.warn(`[Nyxora] Failed ${base}:`, err.message);
          }
        }

        throw lastError || new Error('All Invidious instances failed');
      }

      // ── Create a single video card element ───────────────────────
      function createVideoCard(video) {
        const title = video.title || 'Untitled';
        const videoId = video.videoId || '';
        const author = video.author || 'Unknown';
        const viewCountText = video.viewCountText || formatViews(video.viewCount);
        const thumbnailUrl = getBestThumbnail(video.videoThumbnails);
        const embedUrl = `${CONFIG.embedBase}${videoId}`;

        const card = document.createElement('div');
        card.className = 'video-card';

        // Thumbnail
        const thumbWrap = document.createElement('div');
        thumbWrap.className = 'video-card-thumbnail';

        const img = document.createElement('img');
        img.src = thumbnailUrl;
        img.alt = title;
        img.loading = 'lazy';
        thumbWrap.appendChild(img);

        // Info
        const info = document.createElement('div');
        info.className = 'video-card-info';

        const titleEl = document.createElement('h3');
        titleEl.className = 'video-card-title';
        titleEl.textContent = title;

        const authorEl = document.createElement('p');
        authorEl.className = 'video-card-author';
        authorEl.textContent = author;

        const viewsEl = document.createElement('span');
        viewsEl.className = 'video-card-views';
        viewsEl.textContent = viewCountText;

        info.appendChild(titleEl);
        info.appendChild(authorEl);
        info.appendChild(viewsEl);

        card.appendChild(thumbWrap);
        card.appendChild(info);

        // Click → open embed player
        card.addEventListener('click', function () {
          openPlayer(embedUrl, title);
        });

        return card;
      }

      // ── Lightbox embed player ────────────────────────────────────
      function openPlayer(embedUrl, title) {
        const existing = document.querySelector('.nyxora-player-overlay');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.className = 'nyxora-player-overlay';
        overlay.style.cssText = `
          position: fixed;
          top: 0; left: 0;
          width: 100%; height: 100%;
          background: rgba(0,0,0,0.92);
          z-index: 99999;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-direction: column;
          backdrop-filter: blur(4px);
        `;

        // Close button
        const closeBtn = document.createElement('button');
        closeBtn.textContent = '✕';
        closeBtn.setAttribute('aria-label', 'Close player');
        closeBtn.style.cssText = `
          position: absolute;
          top: 20px; right: 30px;
          background: rgba(255,255,255,0.08);
          border: 1px solid rgba(255,255,255,0.15);
          color: #fff; font-size: 24px;
          width: 44px; height: 44px;
          border-radius: 50%;
          cursor: pointer; z-index: 100000;
          display: flex; align-items: center;
          justify-content: center;
          transition: background 0.2s;
          font-family: sans-serif;
        `;
        closeBtn.addEventListener('mouseenter', () => {
          closeBtn.style.background = 'rgba(255,255,255,0.15)';
        });
        closeBtn.addEventListener('mouseleave', () => {
          closeBtn.style.background = 'rgba(255,255,255,0.08)';
        });
        closeBtn.addEventListener('click', () => overlay.remove());

        // Iframe
        const iframe = document.createElement('iframe');
        iframe.src = embedUrl;
        iframe.title = title || 'Video';
        iframe.allow =
          'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        iframe.allowFullscreen = true;
        iframe.style.cssText = `
          width: 90vw;
          max-width: 960px;
          aspect-ratio: 16 / 9;
          border: none;
          border-radius: 10px;
          box-shadow: 0 12px 48px rgba(0,0,0,0.7);
        `;

        overlay.appendChild(closeBtn);
        overlay.appendChild(iframe);
        document.body.appendChild(overlay);

        // Close on backdrop click
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) overlay.remove();
        });

        // Close on Escape
        const escHandler = (e) => {
          if (e.key === 'Escape') {
            overlay.remove();
            document.removeEventListener('keydown', escHandler);
          }
        };
        document.addEventListener('keydown', escHandler);
      }

      // ── Render cards into a grid container ───────────────────────
      function renderCards(containerId, videos) {
        const container = document.getElementById(containerId);
        if (!container) {
          console.warn(`[Nyxora] #${containerId} not found in DOM`);
          return;
        }

        container.innerHTML = '';

        if (!videos || videos.length === 0) {
          container.innerHTML =
            '<p class="nyxora-empty">No videos available right now.</p>';
          return;
        }

        // Filter to video-type items (search can return playlists/channels)
        const videoItems = videos.filter(
          (v) => !v.type || v.type === 'video' || v.type === 'shortVideo'
        );

        if (videoItems.length === 0) {
          container.innerHTML =
            '<p class="nyxora-empty">No video results found.</p>';
          return;
        }

        // Use DocumentFragment for performance
        const fragment = document.createDocumentFragment();
        for (const video of videoItems) {
          fragment.appendChild(createVideoCard(video));
        }
        container.appendChild(fragment);
      }

      // ── Boot ────────────────────────────────────────────────────
      async function init() {
        console.log('[Nyxora] Engine starting…');

        try {
          const [reelsData, moviesData] = await Promise.all([
            fetchFromInvidious(CONFIG.endpoints.reels),
            fetchFromInvidious(CONFIG.endpoints.movies),
          ]);

          renderCards('reel-view', reelsData);
          renderCards('movie-view', moviesData);

          console.log('[Nyxora] All content loaded ✅');
        } catch (err) {
          console.error('[Nyxora] Fatal:', err.message);

          const msg =
            '<p class="nyxora-error">⚠️ Could not load content. All API instances unreachable. Try again later.</p>';
          const reel = document.getElementById('reel-view');
          const movie = document.getElementById('movie-view');
          if (reel) reel.innerHTML = msg;
          if (movie) movie.innerHTML = msg;
        }
      }

      // ── Kick off on DOM ready ────────────────────────────────────
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
  </html>
