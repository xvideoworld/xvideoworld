<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Watch Movie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#111;min-height:100vh;overflow-x:hidden}

/* ── Mobile First ── */
.container{width:100%;max-width:480px;margin:0 auto;padding:0}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #eee;background:#fff;position:sticky;top:0;z-index:100}
.header .logo{font-size:1.1rem;font-weight:800;color:#cc0000;display:flex;align-items:center;gap:4px}
.header .logo span{font-size:1.3rem}
.header .menu{display:flex;gap:14px}
.header .menu a{text-decoration:none;color:#555;font-size:0.8rem;font-weight:500}
.header .menu a.active{color:#cc0000;font-weight:600}

/* Player */
.player-wrap{width:100%;background:#000;position:relative}
.player-wrap video{width:100%;display:block;max-height:50vh;background:#000}
.player-wrap video::-webkit-media-controls-panel{background:linear-gradient(0deg,rgba(0,0,0,0.8),transparent)}
.player-wrap video::-webkit-media-controls-timeline{background:#cc0000}
.player-wrap video::-webkit-media-controls-play-button{background:rgba(204,0,0,0.3);border-radius:50%}

/* Quality selector */
.quality-bar{display:flex;gap:6px;padding:8px 16px;background:#fafafa;border-bottom:1px solid #eee;overflow-x:auto;-webkit-overflow-scrolling:touch}
.quality-bar .qlabel{font-size:0.7rem;color:#888;font-weight:600;white-space:nowrap;margin-right:4px;padding-top:4px}
.quality-btn{padding:5px 14px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#555;font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.quality-btn:active{transform:scale(0.95)}
.quality-btn.active{background:#cc0000;color:#fff;border-color:#cc0000}

/* Info section */
.info{padding:14px 16px 10px}
.info h1{font-size:1.1rem;font-weight:700;margin-bottom:4px;color:#111}
.info .meta{display:flex;gap:10px;font-size:0.78rem;color:#666;margin-bottom:8px;flex-wrap:wrap}
.info .meta .imdb{background:#f5c518;color:#000;padding:1px 6px;border-radius:3px;font-weight:700;font-size:0.7rem}
.info .tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.info .tags span{background:#fef0f0;color:#cc0000;font-size:0.65rem;padding:2px 8px;border-radius:10px;border:1px solid #fdd}
.info p{font-size:0.8rem;color:#555;line-height:1.6;margin-bottom:6px}

/* Cast */
.cast-section{padding:10px 16px 16px}
.cast-section h2{font-size:0.9rem;font-weight:700;margin-bottom:10px;color:#222}
.cast-scroll{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.cast-item{text-align:center;min-width:80px;flex-shrink:0}
.cast-item img{width:44px;height:44px;border-radius:50%;object-fit:cover;background:#ddd;margin-bottom:4px}
.cast-item .name{font-size:0.68rem;font-weight:600;color:#333}
.cast-item .char{font-size:0.6rem;color:#888}

/* Loading */
.loading{display:none;text-align:center;padding:20px;color:#cc0000;font-size:0.8rem}
.loading.show{display:block}
.error-msg{display:none;background:#fff0f0;color:#cc0000;padding:10px 14px;font-size:0.78rem;border-bottom:1px solid #fcc}

/* Footer */
.footer{padding:16px;text-align:center;font-size:0.65rem;color:#bbb;border-top:1px solid #eee;margin-top:4px}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo"><span>▶</span>Watch</div>
    <div class="menu">
      <a href="#" class="active">Home</a>
      <a href="#">Movies</a>
    </div>
  </div>

  <!-- Player -->
  <div class="player-wrap">
    <video id="player" controls autoplay playsinline preload="auto"></video>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Quality -->
  <div class="quality-bar" id="qualityBar">
    <span class="qlabel">Quality:</span>
  </div>

  <!-- Loading -->
  <div class="loading show" id="loading">Loading video...</div>

  <!-- Info -->
  <div class="info">
    <h1 id="title">War Machine</h1>
    <div class="meta">
      <span>2026</span>
      <span>1h 46m</span>
      <span class="imdb">★ 6.3</span>
      <span>R</span>
    </div>
    <div class="tags" id="tags">
      <span>Action</span><span>Sci-Fi</span><span>Thriller</span>
    </div>
    <p id="desc">Follow the final recruits of a grueling special ops boot camp who encounter a deadly force from beyond this world.</p>
  </div>

  <!-- Cast -->
  <div class="cast-section">
    <h2>Cast</h2>
    <div class="cast-scroll" id="castScroll"></div>
  </div>

  <div class="footer">© 2026</div>
</div>

<script>
// ── Full Movie Stream URLs (from MovieBox API) ──
const STREAMS = [
  {quality:'360p',url:'https://bcdnxw.hakunaymatata.com/convert-h264/fe729f920aa949b819d4485f344e407a.mp4?sign=e2cdfb59bf117229e11210af9bc21d4a&t=1778819792'},
  {quality:'480p',url:'https://bcdnxw.hakunaymatata.com/bt/2f7013900b7ad405584e17d6f820a38c.mp4?sign=e0f81b9563c6d969ee0e71bb63326d49&t=1778818653'},
  {quality:'1080p',url:'https://bcdnxw.hakunaymatata.com/resource/4395ced5b1d2515978eb4e40d0061d8c.mp4?sign=0f73a456f87707e94ac76c2e05147ecb&t=1778818879'}
];

const video = document.getElementById('player');
const loading = document.getElementById('loading');
const errorEl = document.getElementById('errorMsg');
const qualityBar = document.getElementById('qualityBar');

// ── Build quality buttons ──
STREAMS.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'quality-btn' + (i === 0 ? ' active' : '');
  btn.textContent = s.quality;
  btn.onclick = () => playStream(i, btn);
  qualityBar.appendChild(btn);
});

// ── Play stream ──
function playStream(index, btn) {
  const stream = STREAMS[index];
  if (!stream) return;
  
  loading.classList.add('show');
  errorEl.style.display = 'none';
  
  // Update active button
  document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  
  video.src = stream.url;
  video.play()
    .then(() => loading.classList.remove('show'))
    .catch(() => {
      loading.classList.remove('show');
      errorEl.textContent = 'Tap to play';
      errorEl.style.display = 'block';
    });
}

// ── Auto-play 360p (fastest) ──
playStream(0);

// ── Cast ──
const cast = [
  {name:'Alan Ritchson',char:'Lead',img:'https://pbcdnw.aoneroom.com/image/2022/09/02/caf22d301359d7dae00390571ee291df.jpg'},
  {name:'Dennis Quaid',char:'Sheridan',img:'https://pbcdnw.aoneroom.com/image/2022/09/02/caf22d301359d7dae00390571ee291df.jpg'},
  {name:'Jai Courtney',char:'Squad Leader',img:'https://pbcdnw.aoneroom.com/image/2022/09/02/225d026eb4a3bb8682e1d3edf5cb5a97.jpg'},
  {name:'Keiynan Lonsdale',char:'60',img:'https://pbcdnw.aoneroom.com/image/2022/10/13/c8ee0d89156998bea9d14773f596d672.jpg'},
  {name:'Daniel Webber',char:'57',img:'https://pbcdnw.aoneroom.com/image/2022/09/02/bfd49119f68448a8cb1fdace0f86e2c.jpg'},
  {name:'Esai Morales',char:'Torres',img:'https://pbcdnw.aoneroom.com/image/2022/09/02/e3419349b1bfbd35dbd9ba3d9da52d61.jpg'},
];

const scroll = document.getElementById('castScroll');
cast.forEach(p => {
  const d = document.createElement('div');
  d.className = 'cast-item';
  d.innerHTML = `<img src="${p.img}" alt="${p.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2244%22 height=%2244%22><rect fill=%22%23ddd%22 width=%2244%22 height=%2244%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%228%22>${p.name[0]}</text></svg>'"><div class="name">${p.name}</div><div class="char">${p.char}</div>`;
  scroll.appendChild(d);
});
</script>
</body>
</html>
