<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #0d0d0d;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #eee;
    padding: 20px;
  }
  .player-container {
    width: 100%;
    max-width: 900px;
    background: #1a1a1a;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .embed-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 */
    background: #000;
  }
  .embed-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: #000;
  }
  .video-info {
    padding: 20px 24px;
  }
  .video-info h1 {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #fff;
    line-height: 1.4;
  }
  .video-info .meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.9rem;
    color: #aaa;
  }
  .video-info .meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .input-section {
    width: 100%;
    max-width: 900px;
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
  }
  .input-section input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
  }
  .input-section input:focus {
    border-color: #ff4500;
  }
  .input-section button {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    background: #ff4500;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .input-section button:hover {
    background: #e03d00;
  }
  .error-msg {
    color: #ff6b6b;
    margin-top: 12px;
    font-size: 0.9rem;
    display: none;
  }
  .footer {
    margin-top: 30px;
    font-size: 0.8rem;
    color: #555;
  }
</style>
</head>
<body>

  <div class="input-section">
    <input type="text" id="videoUrl" placeholder="Paste a YouTube link (youtu.be/... or youtube.com/watch?v=...)" value="https://youtu.be/x31yPZY3DUw">
    <button onclick="loadVideo()">▶ Load</button>
  </div>

  <div class="player-container" id="playerContainer">
    <div class="embed-wrapper">
      <iframe id="videoIframe" src="https://inv.thepixora.com/embed/x31yPZY3DUw" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>
    <div class="video-info">
      <h1 id="videoTitle">Hilarious Indian Tv Serials | Ft.K drama</h1>
      <div class="meta">
        <span>🎬 <span id="videoAuthor">Loading...</span></span>
        <span>👁️ <span id="videoViews">Loading...</span></span>
      </div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="footer">Clean embed via Invidious · No YouTube branding</div>

<script>
  const INSTANCE = 'inv.thepixora.com';

  function extractVideoId(url) {
    const trimmed = url.trim();
    // youtu.be/VIDEOID
    const shortMatch = trimmed.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
    if (shortMatch) return shortMatch[1];
    // youtube.com/watch?v=VIDEOID
    const longMatch = trimmed.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
    if (longMatch) return longMatch[1];
    // direct 11-char ID
    if (/^[a-zA-Z0-9_-]{11}$/.test(trimmed)) return trimmed;
    return null;
  }

  async function loadVideo() {
    const input = document.getElementById('videoUrl');
    const url = input.value;
    const videoId = extractVideoId(url);
    const errorEl = document.getElementById('errorMsg');
    errorEl.style.display = 'none';

    if (!videoId) {
      errorEl.textContent = '❌ Invalid YouTube URL. Use youtu.be/ID or youtube.com/watch?v=ID';
      errorEl.style.display = 'block';
      return;
    }

    // Set embed immediately
    const iframe = document.getElementById('videoIframe');
    iframe.src = `https://${INSTANCE}/embed/${videoId}`;

    // Fetch video details
    try {
      const res = await fetch(`https://${INSTANCE}/api/v1/videos/${videoId}`);
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();

      document.getElementById('videoTitle').textContent = data.title || 'Untitled';
      document.getElementById('videoAuthor').textContent = data.author || 'Unknown';
      document.getElementById('videoViews').textContent = data.viewCountText || data.viewCount || 'N/A';
    } catch (err) {
      document.getElementById('videoTitle').textContent = 'Playing...';
      document.getElementById('videoAuthor').textContent = '—';
      document.getElementById('videoViews').textContent = '—';
      // Not critical — embed still works
    }
  }

  // Load on Enter key
  document.getElementById('videoUrl').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadVideo();
  });

  // Auto-load on page open
  loadVideo();
</script>
</body>
</html>
