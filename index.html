<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyxora - Premium Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #ff0000;
            --glass: rgba(255, 255, 255, 0.15); /* কাঁচের মতো স্বচ্ছ সাদা */
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: var(--text);
            /* ছবিটা একদম অরিজিনাল রাখার জন্য Overlay সরানো হয়েছে */
            background: url('https://i.postimg.cc/3RGD3350/a707925633db413cd7d514767ecdfa1f.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Header Style with Blur */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); /* ব্লার ইফেক্ট */
            -webkit-backdrop-filter: blur(15px);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 28px; font-weight: 900; cursor: pointer; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .logo span { color: var(--primary); }

        .search-box input {
            width: 85%;
            padding: 12px;
            margin-top: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: white;
            outline: none;
            backdrop-filter: blur(5px);
        }

        /* Content Area */
        #app-viewport {
            padding: 15px;
            padding-bottom: 100px;
        }

        .section-title { 
            font-size: 22px;
            margin: 20px 0;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* Card with White Blur Effect */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }

        .card-body { padding: 10px; background: rgba(0,0,0,0.2); }
        .card-body h4 { 
            margin: 0; 
            font-size: 13px; 
            color: #fff;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .btn-play {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px;
            margin-top: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        /* Bottom Nav with Blur */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .nav-item { text-align: center; color: #ddd; font-size: 12px; cursor: pointer; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .loader { text-align: center; padding: 50px; color: #fff; text-shadow: 1px 1px 5px #000; }
    </style>
</head>
<body>

    <header>
        <div class="logo" id="logo-btn">Nyx<span>ora</span></div>
        <div class="search-box">
            <input type="text" placeholder="Nyxora ক্লাউডে খুঁজুন...">
        </div>
    </header>

    <main id="app-viewport">
        <div id="view-title" class="section-title">Trending Reels</div>
        <div id="content-grid" class="grid"></div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navigate('reel', this)">
            <i class="fa fa-bolt"></i><span>Reels</span>
        </div>
        <div class="nav-item" onclick="navigate('movie', this)">
            <i class="fa fa-play-circle"></i><span>Movies</span>
        </div>
        <div class="nav-item" onclick="navigate('app', this)">
            <i class="fa fa-download"></i><span>Apps</span>
        </div>
    </nav>

    <script>
        // মাল্টিপল সার্ভার যাতে একটা কাজ না করলে অন্যটা করে
        const INSTANCES = [
            "https://invidious.flokinet.to/api/v1",
            "https://inv.riverside.rocks/api/v1",
            "https://vid.puffyan.us/api/v1",
            "https://invidious.snopyta.org/api/v1"
        ];
        let currentInstance = INSTANCES[0];
        let secretCounter = 0;

        async function navigate(type, element) {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            element.classList.add('active');

            const grid = document.getElementById('content-grid');
            const title = document.getElementById('view-title');
            grid.innerHTML = '<div class="loader">Nyxora কানেক্ট হচ্ছে...</div>';

            if (type === 'reel') {
                title.innerText = "Trending Reels";
                fetchVideos('trending?type=shorts');
            } else if (type === 'movie') {
                title.innerText = "Latest Trailers";
                fetchVideos('search?q=official+movie+trailers+2026');
            } else if (type === 'app') {
                title.innerText = "Premium Apps (APK)";
                grid.innerHTML = '<p style="text-align:center; padding:20px;">APK স্টোর শীঘ্রই আসছে...</p>';
            }
        }

        async function fetchVideos(endpoint) {
            const grid = document.getElementById('content-grid');
            let success = false;

            // সার্ভার ফেইল করলে অন্য সার্ভার ট্রাই করার লজিক
            for (let url of INSTANCES) {
                try {
                    const res = await fetch(`${url}/${endpoint}`);
                    if (!res.ok) continue;
                    const data = await res.json();
                    
                    grid.innerHTML = ''; 
                    data.slice(0, 12).forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${item.videoThumbnails[0].url}" alt="thumb">
                            <div class="card-body">
                                <h4>${item.title}</h4>
                                <button class="btn-play" onclick="watch('${item.videoId}')">এখনই দেখুন</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    currentInstance = url; // যেটা কাজ করেছে সেটা সেট করে রাখা
                    success = true;
                    break;
                } catch (err) {
                    console.log("Instance failed, trying next...");
                }
            }

            if (!success) {
                grid.innerHTML = '<div class="loader">সবগুলো সার্ভার ব্যস্ত। একটু পর চেষ্টা করুন।</div>';
            }
        }

        function watch(id) {
            // ক্লিন প্লেয়ার
            const playerUrl = `${currentInstance.replace('/api/v1', '/embed')}/${id}?autoplay=1`;
            window.open(playerUrl, '_blank');
        }

        document.getElementById('logo-btn').addEventListener('click', () => {
            secretCounter++;
            if (secretCounter === 5) {
                alert("Nyxora VIP আনলক হয়েছে!");
                secretCounter = 0;
            }
        });

        window.onload = () => navigate('reel', document.querySelector('.nav-item'));
    </script>
</body>
</html>
