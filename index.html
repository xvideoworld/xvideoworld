<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neumorphism Movie App</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#e9edf2;
  --dark:#222;
  --light:#ffffff;
  --shadow1:#c7ccd1;
  --shadow2:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--dark);
  min-height:100vh;
  padding-bottom:100px;
}

/* TOPBAR */

.topbar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px;
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
}

.logo{
  width:48px;
  height:48px;
  border-radius:16px;
  object-fit:cover;

  box-shadow:
  8px 8px 16px var(--shadow1),
  -8px -8px 16px var(--shadow2);
}

.search-wrap{
  flex:1;
  display:flex;
  align-items:center;
  border-radius:18px;
  overflow:hidden;
  background:var(--bg);

  box-shadow:
  inset 5px 5px 12px var(--shadow1),
  inset -5px -5px 12px var(--shadow2);
}

.search-wrap input{
  flex:1;
  border:none;
  outline:none;
  background:none;
  padding:14px;
  font-size:14px;
}

.search-wrap button{
  width:50px;
  height:50px;
  border:none;
  background:none;
  font-size:18px;
}

/* SECTION */

.section-title{
  padding:20px 18px 12px;
  font-size:24px;
  font-weight:800;
}

/* SCROLL */

.scroll-x{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:0 18px 22px;
  scrollbar-width:none;
}

.scroll-x::-webkit-scrollbar{
  display:none;
}

/* MOVIE CARDS */

.movie-card{
  min-width:160px;
  height:210px;
  border-radius:30px;
  padding:18px;
  display:flex;
  align-items:flex-end;

  background:linear-gradient(135deg,#4e54c8,#8f94fb);

  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
}

.movie-card:nth-child(2){
  background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

.movie-card:nth-child(3){
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

.movie-card:nth-child(4){
  background:linear-gradient(135deg,#8e2de2,#4a00e0);
}

.movie-title{
  color:#fff;
  font-size:22px;
  font-weight:800;
}

/* BANNER */

.banner{
  margin:0 18px 22px;
  height:220px;
  border-radius:32px;
  padding:24px;
  display:flex;
  align-items:flex-end;
  position:relative;
  overflow:hidden;

  background:linear-gradient(135deg,#141e30,#243b55);

  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
}

.banner-title{
  color:#fff;
  font-size:34px;
  font-weight:800;
}

.banner-sub{
  color:#ddd;
  margin-top:4px;
}

.banner-badge{
  position:absolute;
  top:18px;
  right:18px;
  background:#fff;
  color:#111;
  padding:7px 16px;
  border-radius:20px;
  font-size:12px;
  font-weight:800;
}

/* APP GRID */

.app-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  padding:0 18px 20px;
}

.app-card{
  padding:24px 10px;
  border-radius:28px;
  text-align:center;
  background:var(--bg);

  box-shadow:
  8px 8px 16px var(--shadow1),
  -8px -8px 16px var(--shadow2);
}

.app-icon{
  width:72px;
  height:72px;
  border-radius:24px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;

  box-shadow:
  inset 5px 5px 12px var(--shadow1),
  inset -5px -5px 12px var(--shadow2);
}

.app-name{
  margin-top:16px;
  font-size:17px;
  font-weight:800;
}

.app-type{
  margin-top:5px;
  color:#666;
  font-size:12px;
}

/* LOGIN */

.login-box{
  margin:0 18px 25px;
  padding:30px 22px;
  border-radius:35px;
  background:var(--bg);

  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
}

.login-title{
  text-align:center;
  font-size:36px;
  font-weight:800;
  margin-bottom:28px;
}

.input-box{
  width:100%;
  height:58px;
  border:none;
  outline:none;
  padding:0 18px;
  margin-bottom:22px;
  border-radius:18px;
  background:var(--bg);

  box-shadow:
  inset 5px 5px 12px var(--shadow1),
  inset -5px -5px 12px var(--shadow2);
}

.login-btn{
  width:100%;
  height:60px;
  border:none;
  border-radius:20px;
  background:var(--bg);
  font-size:20px;
  font-weight:800;

  box-shadow:
  8px 8px 16px var(--shadow1),
  -8px -8px 16px var(--shadow2);
}

.forgot{
  margin-top:22px;
  text-align:center;
  color:#666;
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  left:18px;
  right:18px;
  bottom:18px;
  height:75px;
  border-radius:30px;
  background:var(--bg);

  display:flex;
  align-items:center;
  justify-content:space-around;

  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  color:#666;
}

.nav-icon{
  font-size:24px;
  margin-bottom:4px;
}

.active{
  color:#111;
  font-weight:800;
}

</style>
</head>
<body>

<!-- TOPBAR -->

<div class="topbar">

<img src="https://i.postimg.cc/bNzXXs5R/Picsart-26-05-07-21-15-13-901.png" class="logo">

<div class="search-wrap">
<input type="text" placeholder="Search movies...">
<button>🔍</button>
</div>

</div>

<!-- MOVIES -->

<div class="section-title">
Trending Movies
</div>

<div class="scroll-x">

<div class="movie-card">
<div class="movie-title">Avengers</div>
</div>

<div class="movie-card">
<div class="movie-title">Batman</div>
</div>

<div class="movie-card">
<div class="movie-title">Inception</div>
</div>

<div class="movie-card">
<div class="movie-title">Dune</div>
</div>

</div>

<!-- BANNER -->

<div class="banner">

<div>
<div class="banner-title">CapCut</div>
<div class="banner-sub">Best Editing App</div>
</div>

<div class="banner-badge">
FREE
</div>

</div>

<!-- APPS -->

<div class="section-title">
Popular Apps
</div>

<div class="app-grid">

<div class="app-card">
<div class="app-icon">🎬</div>
<div class="app-name">CapCut</div>
<div class="app-type">Video Editor</div>
</div>

<div class="app-card">
<div class="app-icon">📸</div>
<div class="app-name">Picsart</div>
<div class="app-type">Photo Editor</div>
</div>

<div class="app-card">
<div class="app-icon">🎵</div>
<div class="app-name">InShot</div>
<div class="app-type">Music Video</div>
</div>

<div class="app-card">
<div class="app-icon">🖌️</div>
<div class="app-name">Canva</div>
<div class="app-type">Design Tool</div>
</div>

</div>

<!-- LOGIN -->

<div class="section-title">
Account
</div>

<div class="login-box">

<div class="login-title">
Welcome
</div>

<input type="text" class="input-box" placeholder="Username">

<input type="password" class="input-box" placeholder="Password">

<button class="login-btn">
Sign In
</button>

<div class="forgot">
Forgot password?
</div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<div class="nav-item active">
<div class="nav-icon">🏠</div>
Home
</div>

<div class="nav-item">
<div class="nav-icon">🎬</div>
Movies
</div>

<div class="nav-item">
<div class="nav-icon">📦</div>
Apps
</div>

<div class="nav-item">
<div class="nav-icon">👤</div>
Profile
</div>

</div>

</body>
</html>
