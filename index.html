<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer"> <title>Nyxora Premium Streaming</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
        }
        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: #38bdf8;
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .card-body {
            padding: 15px;
            text-align: center;
        }
        .card-title {
            font-size: 1rem;
            font-weight: bold;
            text-transform: capitalize;
        }
        /* ভিডিও প্লেয়ার পপআপ */
        #player-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .player-box {
            width: 80%;
            max-width: 800px;
            background: #000;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: -40px; right: 0;
            color: white; font-size: 30px; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>NYXORA STREAMING</h1>
    <p>Premium Content Platform</p>
</header>

<div class="container" id="movie-grid">
    </div>

<div id="player-modal">
    <div class="player-box">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <iframe id="main-player" src="" width="100%" height="450px" frameborder="0" referrerpolicy="no-referrer" allowfullscreen></iframe>
    </div>
</div>

<script>
    // আপনার দেওয়া সেই JSON ডেটা (স্যাম্পল হিসেবে কিছু ক্যাটেগরি)
    const categories = [
        {
            "title":"3d animated",
            "url":"https://www.xvideos.com/embedframe/56234551", // এখানে এমবেড লিঙ্ক ব্যবহার করতে হবে
            "img_url":"https://di.phncdn.com/is-static/images/categories/(m=qP_356TbeqM48zjadOf)(mh=6MEf_XdyKLkUvnb9)roku_86.jpg"
        },
        {
            "title":"Indian",
            "url":"https://www.xvideos.com/embedframe/67891234",
            "img_url":"https://di.phncdn.com/is-static/images/categories/(m=qOW556TbeqM48zjadOf)(mh=X9NmtOo05qEEJWyn)roku_101.jpg"
        },
        {
            "title":"Hentai",
            "url":"https://www.xvideos.com/embedframe/11223344",
            "img_url":"https://di.phncdn.com/is-static/images/categories/(m=q5V556TbeqM48zjadOf)(mh=T50h9WANdRlW_vU0)roku_36.jpg"
        }
    ];

    const grid = document.getElementById('movie-grid');

    // মুভি কার্ড তৈরি করা
    categories.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${item.img_url}" alt="${item.title}">
            <div class="card-body">
                <div class="card-title">${item.title}</div>
            </div>
        `;
        card.onclick = () => openPlayer(item.url);
        grid.appendChild(card);
    });

    function openPlayer(url) {
        document.getElementById('main-player').src = url;
        document.getElementById('player-modal').style.display = 'flex';
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('main-player').src = '';
    }
</script>

</body>
</html>
