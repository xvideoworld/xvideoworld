<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #ffffff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 860px;
  }
  .player-wrapper {
    width: 100%;
    position: relative;
    padding-top: 56.25%;
    background: #f0f0f0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(200,0,0,0.12);
    border: 2px solid #e00000;
  }
  .player-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 1.5rem;
    color: #cc0000;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .header p {
    color: #666;
    font-size: 0.85rem;
  }
  .input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 860px;
  }
  .input-area input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 2px solid #ddd;
    background: #fff;
    color: #333;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
  }
  .input-area input:focus {
    border-color: #cc0000;
  }
  .input-area button {
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    background: #cc0000;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .input-area button:hover {
    background: #a00000;
  }
  .video-meta {
    padding: 14px 4px 6px 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .video-meta .title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #222;
  }
  .video-meta .author {
    color: #cc0000;
    font-weight: 500;
    font-size: 0.9rem;
  }
  .error-msg {
    color: #cc0000;
    margin-top: 10px;
    font-size: 0.9rem;
    display: none;
    text-align: center;
  }
  .loading-indicator {
    display: none;
    text-align: center;
    color: #cc0000;
    font-size: 0.9rem;
    margin-top: 8px;
  }
  .loading-indicator.active {
    display: block;
  }
  .label-red {
    color: #cc0000;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
</style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>▶ Video Player</h1>
      <p>Paste a YouTube link — plays instantly in HD</p>
    </div>

    <div class="input-area">
      <input type="text" id="videoUrl" placeholder="https://youtu.be/... or https://youtube.com/watch?v=..." value="https://youtu.be/x31yPZY3DUw">
      <button onclick="loadVideo()">▶ Play</button>
    </div>

    <div class="player-wrapper">
      <iframe id="videoIframe" src="" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div class="video-meta">
      <span class="title" id="videoTitle">Hilarious Indian Tv Serials | Ft.K drama</span>
      <span class="author" id="videoAuthor">Loading...</span>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="loading-indicator" id="loadingIndicator">⏳ Loading video...</div>
  </div>

<script>
  function extractVideoId(url) {
    const t = url.trim();
    let m = t.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
    if (m) return m[1];
    m = t.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
    if (m) return m[1];
    m = t.match(/embed\/([a-zA-Z0-9_-]{11})/);
    if (m) return m[1];
    if (/^[a-zA-Z0-9_-]{11}$/.test(t)) return t;
    return null;
  }

  function loadVideo() {
    const input = document.getElementById('videoUrl');
    const url = input.value;
    const videoId = extractVideoId(url);
    const errEl = document.getElementById('errorMsg');
    const loadingEl = document.getElementById('loadingIndicator');
    errEl.style.display = 'none';

    if (!videoId) {
      errEl.textContent = '❌ Invalid YouTube link. Use youtu.be/ID or youtube.com/watch?v=ID';
      errEl.style.display = 'block';
      return;
    }

    // Show loading
    loadingEl.classList.add('active');

    // Use YouTube's own embed with parameters to:
    // - Remove branding (modestbranding=1)
    // - Hide controls after playing (controls=1)
    // - Disable related videos (rel=0)
    // - Start with low quality for fast load (vq=small)
    // - Autoplay
    const iframe = document.getElementById('videoIframe');
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&vq=small&enablejsapi=1`;

    // Try to get title from oEmbed API (fast, lightweight)
    fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
      .then(r => r.json())
      .then(data => {
        document.getElementById('videoTitle').textContent = data.title || 'Video';
        document.getElementById('videoAuthor').textContent = data.author_name || '';
        loadingEl.classList.remove('active');
      })
      .catch(() => {
        document.getElementById('videoTitle').textContent = 'Playing...';
        document.getElementById('videoAuthor').textContent = '';
        loadingEl.classList.remove('active');
      });
  }

  // Enter key
  document.getElementById('videoUrl').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadVideo();
  });

  // Auto-load
  loadVideo();
</script>
</body>
</html>
