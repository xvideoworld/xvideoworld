<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও প্লেয়ার - আপনার ওয়েবসাইট</title>
    <style>
        /* বেসিক স্টাইল */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            color: #ff0050; /* একটু উজ্জ্বল কালার */
        }

        /* ভিডিও কন্টেইনার */
        .main-content {
            width: 90%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .info-section {
            margin-top: 20px;
        }

        .info-section h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #ddd;
        }

        .info-section p {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>
        <h1>আপনার ওয়েবসাইটের নাম</h1>
    </header>

    <div class="main-content">
        <div class="video-wrapper">
            <iframe 
                src="https://xhamster.com/embed/xhdDF2g" 
                frameborder="0" 
                scrolling="no" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="info-section">
            <h2>ভিডিওর শিরোনাম এখানে লিখুন</h2>
            <p>ভিডিও সম্পর্কে ছোট কোনো বর্ণনা দিতে চাইলে এখানে লিখতে পারেন। এটি আপনার ওয়েবসাইটের ইউজারদের ভিডিওটি সম্পর্কে বুঝতে সাহায্য করবে।</p>
        </div>
    </div>

    <footer>
        &copy; ২০২৬ আপনার প্ল্যাটফর্ম | সর্বস্বত্ব সংরক্ষিত
    </footer>

</body>
</html>
