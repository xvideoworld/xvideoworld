<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Nyxora Premium Portal</title>
    <style>
        :root {
            --accent: #38bdf8;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg);
            color: white;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
        }
        .header {
            padding: 25px;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, var(--bg));
            border-bottom: 2px solid var(--accent);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 15px;
        }
        .card {
            background: var(--glass);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
        }
        .card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            display: block;
            background: #111; /* ছবি লোড হওয়ার আগে কালো দেখাবে */
        }
        .card-info {
            padding: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            background: rgba(0,0,0,0.7);
            color: #fff;
        }

        /* ভিডিও প্লেয়ার ইন্টারফেস */
        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
        }
        .nav-bar {
            padding: 15px;
            background: #111;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--accent);
        }
        .back-btn {
            cursor: pointer;
            font-size: 18px;
            color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            margin-right: 15px;
        }
        iframe {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
            background: #000;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; letter-spacing: 2px;">NYXORA</h1>
    <p style="color: #94a3b8; margin:5px 0 0 0; font-size: 12px;">The Ultimate Video Engine</p>
</div>

<div class="container" id="content-grid">
    </div>

<div id="video-overlay">
    <div class="nav-bar">
        <div class="back-btn" onclick="closePlayer()">✕ বন্ধ করুন</div>
        <span id="video-title" style="font-size: 14px; opacity: 0.8;">প্লেয়িং...</span>
    </div>
    <iframe id="player-frame" src="" allowfullscreen referrerpolicy="no-referrer"></iframe>
</div>

<script>
    // আপনার দেওয়া সেই ডাটা লিস্ট
    const rawData = [
        {
            "title":"3d animated",
            "url":"https://www.xvideos.com/video56234551/test", // সাধারণ লিঙ্ক
            "img_url":"https://di.phncdn.com/is-static/images/categories/(m=qP_356TbeqM48zjadOf)(mh=6MEf_XdyKLkUvnb9)roku_86.jpg"
        },
        {
            "title":"Indian",
            "url":"https://www.xvideos.com/video67891234/desi",
            "img_url":"https://di.phncdn.com/is-static/images/categories/(m=qOW556TbeqM48zjadOf)(mh=X9NmtOo05qEEJWyn)roku_101.jpg"
        },
        {
            "title":"Asian",
            "url":"https://www.xvideos.com/video12345678/asian_clip",
            "img_url":"https://ei.phncdn.com/is-static/images/categories/(m=qKV256TbeqM48zjadOf)(mh=2Ays7m7fz1V9Em5R)roku_1.jpg"
        },
        {
            "title":"Teen",
            "url":"https://www.xvideos.com/video99887766/teen",
            "img_url":"https://di.phncdn.com/is-static/images/categories/(m=q-1656TbeqM48zjadOf)(mh=fbGu2Lb3uKOnjGHU)roku_37.jpg"
        }
        // আপনি এখানে আপনার আগের লিস্টের সব আইটেম একইভাবে যোগ করতে পারেন
    ];

    const grid = document.getElementById('content-grid');

    rawData.forEach(item => {
        // ইমেজ প্রক্সি: এটি ছবির ব্লকিং কাটবে
        const secureImg = "https://images.weserv.nl/?url=" + encodeURIComponent(item.img_url);
        
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${secureImg}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/150x200?text=No+Image'">
            <div class="card-info">${item.title}</div>
        `;
        card.onclick = () => openPlayer(item.url, item.title);
        grid.appendChild(card);
    });

    function openPlayer(originalUrl, title) {
        const overlay = document.getElementById('video-overlay');
        const frame = document.getElementById('player-frame');
        
        // লিঙ্ক কনভার্টার: সাধারণ লিঙ্ককে এমবেড লিঙ্কে রূপান্তর
        let videoId = originalUrl.match(/video(\d+)/);
        let embedUrl = videoId ? `https://www.xvideos.com/embedframe/${videoId[1]}` : originalUrl;

        document.getElementById('video-title').innerText = title;
        frame.src = embedUrl;
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closePlayer() {
        const overlay = document.getElementById('video-overlay');
        const frame = document.getElementById('player-frame');
        overlay.style.display = 'none';
        frame.src = ''; 
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
