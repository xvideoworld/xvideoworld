<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Stream Dashboard</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 900px;
            background-color: #121212;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        .header-section {
            margin-bottom: 20px;
            border-bottom: 1px solid #222222;
            padding-bottom: 15px;
        }

        .portal-title {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-meta {
            margin-top: 15px;
        }

        .video-title {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 500;
            color: #e5e5e5;
        }

        .video-status {
            display: inline-block;
            font-size: 12px;
            background-color: #1f1f1f;
            padding: 4px 10px;
            border-radius: 4px;
            color: #aaaaaa;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <h1 class="portal-title">Media Stream Center</h1>
    </div>

    <div class="player-wrapper">
        <video id="player" playsinline controls data-poster="https://pacdn.aoneroom.com/image/2026/05/sample-thumb.webp">
            <source src="https://pacdn.aoneroom.com/image/posts/sample-video-hash-ld.mp4" type="video/mp4" />
        </video>
    </div>

    <div class="video-meta">
        <h2 class="video-title" id="current-title">Loading Stream Content...</h2>
        <span class="video-status">CDN SOURCE ACTIVE</span>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const player = new Plyr('#player', {
            controls: [
                'play-large', 
                'play', 
                'progress', 
                'current-time', 
                'mute', 
                'volume', 
                'fullscreen'
            ],
            hideControls: true,
            resetOnEnd: true
        });

        const API_URL = 'https://api.byte-app.com/api/v1/movies';
        const CDN_BASE = 'https://pacdn.aoneroom.com';

        async function loadLatestStream() {
            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                if (data && data.list && data.list.length > 0) {
                    const latestMovie = data.list[0];
                    
                    const videoSrc = `${CDN_BASE}/image/posts/${latestMovie.video_hash}-ld.mp4`;
                    const posterSrc = `${CDN_BASE}/image/${latestMovie.poster_path}.webp`;
                    
                    document.getElementById('current-title').textContent = latestMovie.title;
                    
                    player.source = {
                        type: 'video',
                        title: latestMovie.title,
                        sources: [{ src: videoSrc, type: 'video/mp4' }],
                        poster: posterSrc
                    };
                }
            } catch (error) {
                console.error('Failed to sync stream configuration:', error);
                document.getElementById('current-title').textContent = 'Stream Offline';
            }
        }

        loadLatestStream();
    });
</script>

</body>
</html>
