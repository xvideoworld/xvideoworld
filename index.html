<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মুভি গ্যালারি - ইউটিউব লেআউট</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { padding: 15px; border-bottom: 1px solid #333; position: sticky; top: 0; background: #0f0f0f; z-index: 100; }
        
        /* এক লাইনে একটা বড় ভিডিওর স্টাইল */
        .video-container { width: 100%; display: flex; flex-direction: column; gap: 20px; padding-bottom: 20px; }
        .video-card { text-decoration: none; color: white; width: 100%; }
        
        .thumb-box { position: relative; width: 100%; padding-top: 56.25%; background: #222; }
        .thumb-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .video-details { padding: 12px; display: flex; gap: 12px; }
        .video-details h3 { margin: 0; font-size: 16px; font-weight: normal; line-height: 1.4; }
        
        /* ৪জিবি র‍্যামে যাতে ল্যাগ না করে তাই হালকা এনিমেশন */
        .video-card:active { background: #222; }
    </style>
</head>
<body>

<header><strong>আমার মুভি কালেকশন</strong></header>

<div class="video-container" id="videoGrid"></div>

<script>
    // আপনার সেই JSON ডাটা এখানে (সংক্ষেপে দেখাচ্ছি)
    const movies = [
        {"title":"3d animated", "url":"https://www.xvideos.com/embedframe/xhdDF2g", "img_url":"https://di.phncdn.com/is-static/images/categories/(m=qP_356TbeqM48zjadOf)(mh=6MEf_XdyKLkUvnb9)roku_86.jpg"},
        {"title":"Amateur", "url":"https://www.xvideos.com/embedframe/xhdDF2g", "img_url":"https://ei.phncdn.com/is-static/images/categories/(m=qYR256TbeqM48zjadOf)(mh=IxMMDoS8KN1bzGlK)roku_3.jpg"}
        // ... বাকি সব ডাটা এখানে একইভাবে বসবে
    ];

    const grid = document.getElementById('videoGrid');

    movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'video-card';
        // এখানে ক্লিক করলে play.html এ যাবে এবং ভিডিও ইউআরএল প্যারামিটার হিসেবে পাঠাবে
        card.onclick = () => {
            window.location.href = `play.html?vid=${encodeURIComponent(movie.url)}&title=${encodeURIComponent(movie.title)}`;
        };

        card.innerHTML = `
            <div class="thumb-box">
                <img src="${movie.img_url}" loading="lazy">
            </div>
            <div class="video-details">
                <h3>${movie.title}</h3>
            </div>
        `;
        grid.appendChild(card);
    });
</script>
</body>
</html>
