<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container { width: 100%; max-width: 860px; }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 1.5rem;
    color: #cc0000;
    font-weight: 700;
  }
  .header p { color: #888; font-size: 0.85rem; margin-top: 4px; }
  .input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .input-area input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 2px solid #ddd;
    background: #fff;
    color: #333;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
  }
  .input-area input:focus { border-color: #cc0000; }
  .input-area button {
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    background: #cc0000;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .input-area button:hover { background: #a00000; }
  .player-wrapper {
    width: 100%;
    background: #f5f5f5;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(200,0,0,0.10);
    border: 2px solid #cc0000;
    position: relative;
  }
  .player-wrapper video {
    width: 100%;
    display: block;
    background: #000;
    max-height: 70vh;
  }
  .player-wrapper video::-webkit-media-controls {
    background: rgba(204,0,0,0.08);
  }
  .video-meta {
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    background: #fff;
    border-top: 1px solid #f0f0f0;
  }
  .video-meta .title {
    font-size: 1.05rem;
    font-weight: 600;
    color: #222;
  }
  .video-meta .author {
    color: #cc0000;
    font-weight: 500;
    font-size: 0.9rem;
  }
  .error-msg {
    color: #cc0000;
    margin-top: 10px;
    font-size: 0.9rem;
    display: none;
    text-align: center;
  }
  .loading-indicator {
    display: none;
    text-align: center;
    color: #cc0000;
    font-size: 0.9rem;
    padding: 10px 0;
  }
  .loading-indicator.active { display: block; }
  .quality-selector {
    display: flex;
    gap: 6px;
    padding: 10px 18px;
    background: #fafafa;
    border-top: 1px solid #eee;
    flex-wrap: wrap;
    align-items: center;
  }
  .quality-selector label {
    font-size: 0.8rem;
    color: #666;
    font-weight: 600;
    margin-right: 6px;
  }
  .quality-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid #ddd;
    background: #fff;
    color: #555;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quality-btn:hover { border-color: #cc0000; color: #cc0000; }
  .quality-btn.active {
    background: #cc0000;
    color: #fff;
    border-color: #cc0000;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>▶ Custom Video Player</h1>
      <p>Paste a YouTube link — plays in our own player</p>
    </div>
    <div class="input-area">
      <input type="text" id="videoUrl" placeholder="https://youtu.be/... or https://youtube.com/watch?v=..." value="https://youtu.be/x31yPZY3DUw">
      <button onclick="loadVideo()">▶ Play</button>
    </div>
    <div class="player-wrapper">
      <video id="videoPlayer" controls autoplay playsinline></video>
      <div class="quality-selector" id="qualitySelector"></div>
      <div class="video-meta">
        <span class="title" id="videoTitle">Loading...</span>
        <span class="author" id="videoAuthor"></span>
      </div>
    </div>
    <div class="loading-indicator" id="loadingIndicator">⏳ Loading video stream...</div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

<script>
  const PIPED_API = 'https://api.piped.private.coffee';

  function extractVideoId(url) {
    const t = url.trim();
    let m = t.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
    if (m) return m[1];
    m = t.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
    if (m) return m[1];
    m = t.match(/embed\/([a-zA-Z0-9_-]{11})/);
    if (m) return m[1];
    if (/^[a-zA-Z0-9_-]{11}$/.test(t)) return t;
    return null;
  }

  let allStreams = [];
  let currentUrl = '';

  async function loadVideo() {
    const input = document.getElementById('videoUrl');
    const url = input.value;
    const videoId = extractVideoId(url);
    const errEl = document.getElementById('errorMsg');
    const loadingEl = document.getElementById('loadingIndicator');
    const video = document.getElementById('videoPlayer');
    const qSel = document.getElementById('qualitySelector');
    errEl.style.display = 'none';

    if (!videoId) {
      errEl.textContent = '❌ Invalid YouTube link. Use youtu.be/ID or youtube.com/watch?v=ID';
      errEl.style.display = 'block';
      return;
    }

    loadingEl.classList.add('active');
    video.src = '';
    qSel.innerHTML = '';
    allStreams = [];
    document.getElementById('videoTitle').textContent = 'Loading...';
    document.getElementById('videoAuthor').textContent = '';

    try {
      const res = await fetch(`${PIPED_API}/streams/${videoId}`);
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();

      document.getElementById('videoTitle').textContent = data.title || 'Untitled';
      document.getElementById('videoAuthor').textContent = data.uploader || '';

      // Get video streams (combined video+audio)
      const streams = data.videoStreams || [];
      if (streams.length === 0) throw new Error('No video streams available');

      allStreams = streams;
      
      // Build quality selector
      streams.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = 'quality-btn' + (i === 0 ? ' active' : '');
        btn.textContent = s.quality;
        btn.onclick = () => setQuality(i);
        qSel.appendChild(btn);
      });

      // Add a "Video Only" label if any exist
      if ((data.videoOnlyStreams || []).length > 0) {
        const sep = document.createElement('span');
        sep.style.cssText = 'font-size:0.75rem;color:#aaa;margin:0 4px;';
        sep.textContent = '|';
        qSel.appendChild(sep);
        const label = document.createElement('span');
        label.style.cssText = 'font-size:0.75rem;color:#999;';
        label.textContent = '(video only below)';
        qSel.appendChild(label);
        (data.videoOnlyStreams || []).forEach((s) => {
          const btn = document.createElement('button');
          btn.className = 'quality-btn';
          btn.textContent = s.quality + ' 🎥';
          btn.onclick = () => {
            loadingEl.classList.add('active');
            video.src = s.url;
            video.play().catch(() => {});
            loadingEl.classList.remove('active');
            document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          };
          qSel.appendChild(btn);
        });
      }

      // Auto-play the best quality
      setQuality(0);
      loadingEl.classList.remove('active');

    } catch (err) {
      loadingEl.classList.remove('active');
      errEl.textContent = '❌ ' + err.message + '. Try another link.';
      errEl.style.display = 'block';
    }
  }

  function setQuality(index) {
    const loadingEl = document.getElementById('loadingIndicator');
    const video = document.getElementById('videoPlayer');
    const stream = allStreams[index];
    if (!stream) return;

    loadingEl.classList.add('active');
    video.src = stream.url;
    video.play().then(() => {
      loadingEl.classList.remove('active');
    }).catch(() => {
      loadingEl.classList.remove('active');
    });

    document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.quality-btn')[index]?.classList.add('active');
  }

  document.getElementById('videoUrl').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadVideo();
  });

  loadVideo();
</script>
</body>
</html>
