<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer"> <title>Nyxora Premium Portal</title>
    <style>
        :root {
            --accent: #38bdf8;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg);
            color: white;
            margin: 0;
            font-family: sans-serif;
        }
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .card {
            background: var(--glass);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-info {
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            text-transform: capitalize;
        }
        /* ভিডিও প্লেয়ার পেজ (স্মার্ট পপআপ) */
        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
        }
        .nav-bar {
            padding: 15px;
            background: #111;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .back-btn {
            cursor: pointer;
            font-size: 20px;
            color: var(--accent);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color: var(--accent); margin:0;">NYXORA</h1>
    <small>Secure Streaming Engine</small>
</div>

<div class="container" id="content-grid">
    </div>

<div id="video-overlay">
    <div class="nav-bar">
        <span class="back-btn" onclick="closePlayer()">⬅ ফিরে যান</span>
        <span id="video-title">প্লেয়িং ভিডিও...</span>
    </div>
    <iframe id="player-frame" src="" allowfullscreen referrerpolicy="no-referrer"></iframe>
</div>

<script>
    // আপনার দেওয়া সেই ক্যাটেগরি ডাটা
    const data = [
        {
            "title":"3d animated",
            "url":"https://www.xvideos.com/embedframe/56234551", 
            "img_url":"https://di.phncdn.com/is-static/images/categories/(m=qP_356TbeqM48zjadOf)(mh=6MEf_XdyKLkUvnb9)roku_86.jpg"
        },
        {
            "title":"Indian",
            "url":"https://www.xvideos.com/embedframe/11223344",
            "img_url":"https://di.phncdn.com/is-static/images/categories/(m=qOW556TbeqM48zjadOf)(mh=X9NmtOo05qEEJWyn)roku_101.jpg"
        },
        {
            "title":"Hentai",
            "url":"https://www.xvideos.com/embedframe/22334455",
            "img_url":"https://di.phncdn.com/is-static/images/categories/(m=q5V556TbeqM48zjadOf)(mh=T50h9WANdRlW_vU0)roku_36.jpg"
        }
        // আপনি চাইলে এখানে আরও আইটেম যোগ করতে পারেন...
    ];

    const grid = document.getElementById('content-grid');

    data.forEach(item => {
        // ইমেজ প্রক্সি ব্যবহার করছি যাতে ব্লক না হয়
        const secureImg = "https://images.weserv.nl/?url=" + encodeURIComponent(item.img_url);
        
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${secureImg}" loading="lazy" alt="${item.title}">
            <div class="card-info">${item.title}</div>
        `;
        card.onclick = () => openPlayer(item.url, item.title);
        grid.appendChild(card);
    });

    function openPlayer(url, title) {
        const overlay = document.getElementById('video-overlay');
        const frame = document.getElementById('player-frame');
        document.getElementById('video-title').innerText = "চলছে: " + title;
        
        frame.src = url;
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // মেইন পেজ স্ক্রল বন্ধ
    }

    function closePlayer() {
        const overlay = document.getElementById('video-overlay');
        const frame = document.getElementById('player-frame');
        
        overlay.style.display = 'none';
        frame.src = ''; // ভিডিও বন্ধ করা
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
