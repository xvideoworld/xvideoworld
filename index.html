<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Website</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#ffffff;
    color:#000;
}

/* HEADER */

header{
    width:100%;
    height:70px;
    border-bottom:2px solid #000;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    position:fixed;
    top:0;
    background:#fff;
    z-index:1000;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:red;
}

.search-box{
    width:60%;
    height:42px;
    border:2px solid #000;
    border-radius:12px;
    padding-left:12px;
    outline:none;
    font-size:16px;
}

/* SIDEBAR */

.sidebar{
    width:70px;
    height:100vh;
    border-right:2px solid #000;
    position:fixed;
    top:70px;
    left:0;
    background:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
    gap:18px;
}

.sidebar button{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    background:red;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

/* MAIN */

main{
    margin-left:70px;
    margin-top:90px;
    padding:20px;
}

/* VIDEO CARDS */

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.video-card{
    border:2px solid #000;
    border-radius:18px;
    overflow:hidden;
    background:#fff;
    transition:0.3s;
}

.video-card:hover{
    transform:scale(1.02);
}

.video{
    width:100%;
    height:180px;
    background:#ddd;
}

.video iframe{
    width:100%;
    height:100%;
    border:none;
}

.video-info{
    padding:12px;
}

.video-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.video-text{
    font-size:14px;
    color:#444;
}

/* BOTTOM NAV */

.bottom-nav{
    width:100%;
    height:70px;
    position:fixed;
    bottom:0;
    left:0;
    background:#fff;
    border-top:2px solid #000;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
}

.bottom-nav button{
    width:55px;
    height:55px;
    border:none;
    border-radius:14px;
    background:red;
    color:#fff;
    font-size:20px;
    cursor:pointer;
}

</style>
</head>
<body>

<!-- HEADER -->

<header>

    <div class="logo">VIDEO</div>

    <input type="text" class="search-box" placeholder="Search videos...">

</header>

<!-- SIDEBAR -->

<div class="sidebar">

    <button>🏠</button>
    <button>🎬</button>
    <button>🔥</button>
    <button>⭐</button>
    <button>⚙</button>

</div>

<!-- MAIN -->

<main>

<div class="video-grid">

    <!-- VIDEO 1 -->

    <div class="video-card">

        <div class="video">

            <iframe 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            allowfullscreen>
            </iframe>

        </div>

        <div class="video-info">

            <div class="video-title">
                Awesome Video
            </div>

            <div class="video-text">
                এখানে ভিডিওর ডেসক্রিপশন থাকবে।
            </div>

        </div>

    </div>

    <!-- VIDEO 2 -->

    <div class="video-card">

        <div class="video">

            <iframe 
            src="https://www.youtube.com/embed/ysz5S6PUM-U"
            allowfullscreen>
            </iframe>

        </div>

        <div class="video-info">

            <div class="video-title">
                New Movie Trailer
            </div>

            <div class="video-text">
                এখানে ভিডিওর ডেসক্রিপশন থাকবে।
            </div>

        </div>

    </div>

    <!-- VIDEO 3 -->

    <div class="video-card">

        <div class="video">

            <iframe 
            src="https://www.youtube.com/embed/tgbNymZ7vqY"
            allowfullscreen>
            </iframe>

        </div>

        <div class="video-info">

            <div class="video-title">
                Trending Video
            </div>

            <div class="video-text">
                এখানে ভিডিওর ডেসক্রিপশন থাকবে।
            </div>

        </div>

    </div>

</div>

</main>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

    <button>🏠</button>
    <button>🔍</button>
    <button>❤️</button>
    <button>👤</button>

</div>

</body>
</html>
