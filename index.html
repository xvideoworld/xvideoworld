<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nyxora Premium</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --primary: #ff0033;
      --bg-glass: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.15);
      --text: #ffffff;
      --shadow: rgba(0,0,0,0.35);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
      linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
      url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1920&auto=format&fit=crop') center/cover fixed;
      min-height:100vh;
      overflow-x:hidden;
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      backdrop-filter: blur(20px);
      background: rgba(0,0,0,0.35);
      border-bottom:1px solid var(--border);
      padding:15px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .logo{
      font-size:30px;
      font-weight:900;
      letter-spacing:1px;
    }

    .logo span{
      color:var(--primary);
    }

    .profile{
      width:42px;
      height:42px;
      border-radius:50%;
      overflow:hidden;
      border:2px solid rgba(255,255,255,0.2);
    }

    .profile img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .search-box{
      margin-top:15px;
      position:relative;
    }

    .search-box input{
      width:100%;
      padding:14px 20px 14px 50px;
      border:none;
      outline:none;
      border-radius:18px;
      background:var(--bg-glass);
      backdrop-filter: blur(15px);
      color:white;
      border:1px solid var(--border);
      font-size:15px;
    }

    .search-box i{
      position:absolute;
      left:18px;
      top:16px;
      color:#ddd;
    }

    .hero{
      position:relative;
      margin:20px 15px;
      border-radius:25px;
      overflow:hidden;
      height:220px;
      background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920&auto=format&fit=crop') center/cover;
      display:flex;
      align-items:flex-end;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .hero::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    }

    .hero-content{
      position:relative;
      z-index:2;
      padding:20px;
    }

    .hero-content h1{
      font-size:28px;
      margin-bottom:10px;
    }

    .hero-content p{
      font-size:14px;
      color:#ddd;
      margin-bottom:15px;
    }

    .hero-buttons{
      display:flex;
      gap:10px;
    }

    .btn{
      border:none;
      padding:12px 18px;
      border-radius:14px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-primary{
      background:var(--primary);
      color:white;
    }

    .btn-glass{
      background:rgba(255,255,255,0.1);
      color:white;
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.15);
    }

    main{
      padding:0 15px 110px;
    }

    .section-title{
      font-size:24px;
      margin-bottom:15px;
      font-weight:800;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .card{
      background:var(--bg-glass);
      border:1px solid var(--border);
      backdrop-filter:blur(15px);
      border-radius:20px;
      overflow:hidden;
      transition:0.35s;
      box-shadow:0 10px 25px var(--shadow);
    }

    .card:hover{
      transform:translateY(-5px) scale(1.02);
    }

    .card-image{
      position:relative;
      overflow:hidden;
    }

    .card img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      display:block;
    }

    .badge{
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(255,0,51,0.9);
      padding:5px 10px;
      border-radius:20px;
      font-size:12px;
      font-weight:bold;
    }

    .card-body{
      padding:12px;
    }

    .card-body h3{
      font-size:14px;
      margin-bottom:8px;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      color:#ccc;
      font-size:12px;
      margin-bottom:10px;
    }

    .play-btn{
      width:100%;
      border:none;
      background:var(--primary);
      color:white;
      padding:10px;
      border-radius:12px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .play-btn:hover{
      opacity:0.9;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      padding:15px 0;
      background:rgba(0,0,0,0.4);
      backdrop-filter:blur(25px);
      border-top:1px solid rgba(255,255,255,0.1);
      z-index:999;
    }

    .nav-item{
      color:#bbb;
      text-align:center;
      font-size:12px;
      cursor:pointer;
      transition:0.3s;
    }

    .nav-item i{
      display:block;
      font-size:22px;
      margin-bottom:5px;
    }

    .nav-item.active{
      color:var(--primary);
      transform:translateY(-3px);
    }

    .loader{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:80px 0;
      font-size:18px;
      font-weight:bold;
    }

    @media(max-width:600px){
      .hero{
        height:190px;
      }

      .hero-content h1{
        font-size:22px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="logo">Nyx<span>ora</span></div>

    <div class="profile">
      <img src="https://i.pravatar.cc/100" alt="profile">
    </div>
  </div>

  <div class="search-box">
    <i class="fa fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search movies, reels, apps...">
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Premium Streaming Experience</h1>
    <p>Ultra modern glass UI with smooth mobile experience.</p>

    <div class="hero-buttons">
      <button class="btn btn-primary">
        <i class="fa fa-play"></i> Watch
      </button>

      <button class="btn btn-glass">
        <i class="fa fa-info-circle"></i> Info
      </button>
    </div>
  </div>
</section>

<main>
  <div class="section-title">Trending Now</div>

  <div class="grid" id="contentGrid"></div>
</main>

<nav class="bottom-nav">

  <div class="nav-item active">
    <i class="fa fa-home"></i>
    <span>Home</span>
  </div>

  <div class="nav-item">
    <i class="fa fa-film"></i>
    <span>Movies</span>
  </div>

  <div class="nav-item">
    <i class="fa fa-fire"></i>
    <span>Trending</span>
  </div>

  <div class="nav-item">
    <i class="fa fa-user"></i>
    <span>Profile</span>
  </div>

</nav>

<script>

const contentGrid = document.getElementById('contentGrid');

const movies = [
  {
    title: 'Cyber Future 2099',
    image: 'https://picsum.photos/500/300?1',
    rating: '9.1',
    year: '2026'
  },
  {
    title: 'Dark Universe',
    image: 'https://picsum.photos/500/300?2',
    rating: '8.7',
    year: '2025'
  },
  {
    title: 'Glass World',
    image: 'https://picsum.photos/500/300?3',
    rating: '9.5',
    year: '2026'
  },
  {
    title: 'Neo City',
    image: 'https://picsum.photos/500/300?4',
    rating: '8.9',
    year: '2025'
  },
  {
    title: 'Quantum Rise',
    image: 'https://picsum.photos/500/300?5',
    rating: '9.3',
    year: '2026'
  },
  {
    title: 'Infinity Night',
    image: 'https://picsum.photos/500/300?6',
    rating: '8.8',
    year: '2025'
  }
];

function renderMovies(data){

  contentGrid.innerHTML = '';

  data.forEach(movie => {

    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="card-image">
        <img loading="lazy" src="${movie.image}" alt="movie">
        <div class="badge">HD</div>
      </div>

      <div class="card-body">
        <h3>${movie.title}</h3>

        <div class="meta">
          <span>⭐ ${movie.rating}</span>
          <span>${movie.year}</span>
        </div>

        <button class="play-btn">
          <i class="fa fa-play"></i> Watch Now
        </button>
      </div>
    `;

    contentGrid.appendChild(card);
  });
}

renderMovies(movies);

const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('input', () => {

  const value = searchInput.value.toLowerCase();

  const filtered = movies.filter(movie =>
    movie.title.toLowerCase().includes(value)
  );

  renderMovies(filtered);

});

</script>

</body>
</html>
