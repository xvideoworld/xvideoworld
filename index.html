<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও প্ল্যাটফর্ম - হোম</title>
    <style>
        /* মূল ডিজাইন (ইউটিউব ডার্ক থিম) */
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #0f0f0f;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 20px;
            color: #ff0000;
            margin: 0;
        }

        /* ভিডিও কন্টেইনার */
        .main-content {
            max-width: 800px;
            margin: 20px auto;
            padding: 10px;
        }

        /* ইউটিউব স্টাইল বড় ভিডিও কার্ড */
        .video-card {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* আইফ্রেম রেসপনসিভ করার নিয়ম (১৬:৯) */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* ১৬:৯ রেশিও */
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ভিডিওর নিচের তথ্য */
        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
        }

        .video-meta {
            font-size: 14px;
            color: #aaa;
        }

        /* বাটন স্টাইল */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            background: #272727;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .action-btn:hover {
            background: #3f3f3f;
        }
    </style>
</head>
<body>

    <header>
        <h1>ভিডিও গ্যালারি</h1>
    </header>

    <div class="main-content">
        
        <div class="video-card">
            <div class="iframe-wrapper">
                <iframe src="https://www.txnhh.com/embedframe/okludboa8da" scrolling="no" allowfullscreen></iframe>
            </div>
            
            <div class="video-info">
                <div class="video-title">আপনার ভিডিওর নাম এখানে লিখুন</div>
                <div class="video-meta">১২০কে ভিউ • ২ ঘণ্টা আগে</div>
                
                <div class="btn-group">
                    <button class="action-btn">👍 লাইক</button>
                    <button class="action-btn">↪️ শেয়ার</button>
                    <button class="action-btn">⬇️ ডাউনলোড</button>
                </div>
            </div>
        </div>
        </div>

</body>
</html>
